function isDark(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches}

function renderNav(){
  const nav=document.getElementById('nav');
  PHASES.forEach((p,i)=>{
    const btn=document.createElement('button');
    btn.className='pnav'+(i===0?' active':'');
    btn.id='nav-'+i;
    btn.textContent=p.label;
    btn.onclick=()=>switchPhase(i);
    nav.appendChild(btn);
  });
}

function renderPhases(){
  const dark=isDark();
  const container=document.getElementById('phases-container');
  PHASES.forEach((p,pi)=>{
    const view=document.createElement('div');
    view.className='phase-view'+(pi===0?' active':'');
    view.id='phase-'+pi;

    const hdr=document.createElement('div');
    hdr.className='phase-header';
    hdr.innerHTML=`<h2>${p.label}: ${p.title}</h2><p>${p.dates}</p>`;
    view.appendChild(hdr);

    p.features.forEach((f,fi)=>{
      const card=document.createElement('div');
      card.className='feature-card';
      const toolTags=f.tools.map(t=>`<span class="fc-tool" style="background:${dark?p.darkBg:p.lightBg};color:${dark?p.darkFg:p.lightFg}">${t}</span>`).join('');
      card.innerHTML=`
        <div class="fc-head" onclick="toggleCard('fc-body-${pi}-${fi}','fc-chev-${pi}-${fi}')">
          <div class="fc-icon" style="background:${dark?p.darkBg:p.lightBg}">${f.icon}</div>
          <div class="fc-meta">
            <div class="fc-title">${f.title}</div>
            <div class="fc-tools">${toolTags}</div>
          </div>
          <span class="fc-chev" id="fc-chev-${pi}-${fi}">▶</span>
        </div>
        <div class="fc-body" id="fc-body-${pi}-${fi}">
          <div class="steps-label">Step by step</div>
          ${f.steps.map((s,si)=>`
            <div class="step">
              <div class="step-num" style="background:${dark?p.darkBg:p.lightBg};color:${dark?p.darkFg:p.lightFg}">${si+1}</div>
              <div class="step-text">${s}</div>
            </div>`).join('')}
        </div>`;
      view.appendChild(card);
    });
    container.appendChild(view);
  });
}

function switchPhase(i){
  document.querySelectorAll('.phase-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.pnav').forEach(b=>b.classList.remove('active'));
  document.getElementById('phase-'+i).classList.add('active');
  const btn=document.getElementById('nav-'+i);
  btn.classList.add('active');
  btn.style.background=PHASES[i].color;
}

function toggleCard(bodyId,chevId){
  const body=document.getElementById(bodyId);
  const chev=document.getElementById(chevId);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

renderNav();
renderPhases();

// Style active nav btn for phase 0
document.getElementById('nav-0').style.background=PHASES[0].color;

// Auto-open first feature of phase 0
setTimeout(()=>toggleCard('fc-body-0-0','fc-chev-0-0'),100);
</script>
